name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit health endpoint
        run: |
          curl --fail --silent --show-error --max-time 60 "https://pranjalnandi.streamlit.app/_stcore/health"